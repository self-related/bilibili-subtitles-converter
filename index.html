<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilibili subtitle converter</title>
    <link rel="stylesheet" href="./styles.css" />
</head>
<body>
    <main>
        <div class="app">
            <div class="section file-picker">
                <input type="file" id="file-input">
                <div class="file-picker__panel">
                    <label for="lang-input">lang
                        <input type="text" id="lang-input" value="en">
                    </label>
                    <button class="file-picker__convert-btn" id="convert-btn">Convert</button>
                </div>
            </div>

            <div class="section result-wrap">
                <a class="download-btn" href="javascript:void(0)" id="download-btn">download</a>
                <p id="result-text"></p>
            </div>
        </div>
    </main>    

    <script src="./index.js"></script>
</body>
</html>
